name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same branch when a new push lands.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + test deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # Integration test (tests/test_read_integration.py) auto-skips
      # without RUN_INTEGRATION=1 + OPENROUTER_API_KEY, so this run
      # never costs anything against a real provider.
      - name: Run pytest
        run: pytest -q
